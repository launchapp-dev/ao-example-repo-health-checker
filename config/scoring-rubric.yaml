dimensions:
  maintenance:
    weight: 25
    checks:
      - name: recent_activity
        points: 10
        criteria: "Last push within 30 days"
        partial:
          - condition: "Last push within 90 days"
            points: 5
          - condition: "Last push within 180 days"
            points: 2
      - name: stale_prs
        points: 8
        criteria: "No PRs open > 7 days"
        partial:
          - condition: "1-2 stale PRs"
            points: 5
          - condition: "3-5 stale PRs"
            points: 2
          - condition: ">5 stale PRs"
            points: 0
      - name: branch_hygiene
        points: 7
        criteria: "< 10 total branches or branch count unavailable"
        partial:
          - condition: "10-20 branches"
            points: 4
          - condition: ">20 branches"
            points: 1

  security:
    weight: 25
    checks:
      - name: no_advisories
        points: 15
        criteria: "Zero open security advisories"
        partial:
          - condition: "1 advisory"
            points: 8
          - condition: "2-3 advisories"
            points: 3
          - condition: ">3 advisories"
            points: 0
      - name: dependency_audit
        points: 10
        criteria: "No critical dependency vulnerabilities (no package.json or clean audit)"
        partial:
          - condition: "Only moderate vulnerabilities"
            points: 6
          - condition: "High vulnerabilities"
            points: 2
          - condition: "Critical vulnerabilities"
            points: 0

  documentation:
    weight: 25
    checks:
      - name: readme_exists
        points: 10
        criteria: "README.md present"
      - name: license_exists
        points: 8
        criteria: "LICENSE file present"
      - name: contributing_exists
        points: 4
        criteria: "CONTRIBUTING.md present"
      - name: codeowners_exists
        points: 3
        criteria: "CODEOWNERS file present"

  ci_cd:
    weight: 25
    checks:
      - name: has_workflows
        points: 12
        criteria: "At least one GitHub Actions workflow in .github/workflows/"
      - name: has_tests
        points: 8
        criteria: "Test directory or test files detectable from language signals"
        note: "Inferred from language breakdown — e.g., JavaScript projects likely have tests if package.json present"
      - name: has_topics
        points: 5
        criteria: "At least one topic tag on the repo"

thresholds:
  healthy: 70
  warning: 40
  critical: 0

labels:
  healthy: "🟢 Healthy"
  warning: "🟡 Warning"
  critical: "🔴 Critical"
