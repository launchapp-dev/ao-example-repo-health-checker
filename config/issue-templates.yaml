templates:
  missing_readme:
    title: "[Repo Health] Missing README.md"
    labels: ["repo-health", "documentation", "automated"]
    body: |
      ## Finding
      This repository is missing a `README.md` file.

      ## Impact
      - New contributors cannot understand the project purpose or how to get started
      - Documentation score: 0/10 for this check (affects overall health score)
      - Reduces discoverability and trust from potential contributors

      ## Recommended Action
      Add a `README.md` with at minimum:
      - **Project description** — what does this repo do and why does it exist?
      - **Setup instructions** — how to clone, install dependencies, and run locally
      - **Usage examples** — basic commands or API examples
      - **Contributing guide** — link to CONTRIBUTING.md or basic PR instructions

      A good README template: [makeareadme.com](https://www.makeareadme.com/)

      ---
      *Generated by [repo-health-checker](https://github.com/launchapp-dev/ao-example-repo-health-checker) on {{scan_date}}*

  missing_license:
    title: "[Repo Health] Missing LICENSE file"
    labels: ["repo-health", "documentation", "automated"]
    body: |
      ## Finding
      This repository is missing a `LICENSE` file.

      ## Impact
      - Without a license, the code is technically "all rights reserved" by default
      - External contributors may be legally unable to use or contribute to the project
      - License score: 0/8 for this check

      ## Recommended Action
      Add a `LICENSE` file. For most open-source projects at launchapp-dev, use MIT:

      1. Go to GitHub → Add file → Create new file
      2. Name the file `LICENSE`
      3. Click "Choose a license template" and select MIT (or your preferred license)
      4. Commit the file

      ---
      *Generated by [repo-health-checker](https://github.com/launchapp-dev/ao-example-repo-health-checker) on {{scan_date}}*

  missing_ci:
    title: "[Repo Health] No CI/CD workflows configured"
    labels: ["repo-health", "ci-cd", "automated"]
    body: |
      ## Finding
      This repository has no GitHub Actions workflows in `.github/workflows/`.

      ## Impact
      - No automated testing on pull requests (CI score: 0/12)
      - Risk of shipping broken code without automated validation
      - Harder to maintain quality as the project grows

      ## Recommended Action
      Add at least one GitHub Actions workflow. A minimal CI workflow:

      ```yaml
      # .github/workflows/ci.yml
      name: CI
      on: [push, pull_request]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Run tests
              run: echo "Add your test command here"
      ```

      See [GitHub Actions quickstart](https://docs.github.com/en/actions/quickstart) for more.

      ---
      *Generated by [repo-health-checker](https://github.com/launchapp-dev/ao-example-repo-health-checker) on {{scan_date}}*

  security_advisory:
    title: "[Repo Health] Open Security Advisory: {{advisory_title}}"
    labels: ["repo-health", "security", "automated", "critical"]
    body: |
      ## Finding
      This repository has an open security advisory that requires attention.

      ## Advisory Details
      - **Severity**: {{severity}}
      - **Package**: {{package}}
      - **Summary**: {{advisory_summary}}
      - **Advisory URL**: {{advisory_url}}

      ## Impact
      - Security score reduced by up to 15 points depending on advisory count
      - Unpatched vulnerabilities expose users of this software to risk

      ## Recommended Action
      1. Review the advisory at the link above
      2. Update the affected dependency to the patched version
      3. If no patch is available, evaluate workarounds or deprecation
      4. Re-run `npm audit` / `pip-audit` / equivalent after updating

      ---
      *Generated by [repo-health-checker](https://github.com/launchapp-dev/ao-example-repo-health-checker) on {{scan_date}}*

  stale_prs:
    title: "[Repo Health] {{count}} Stale Pull Request(s) Open > 7 Days"
    labels: ["repo-health", "maintenance", "automated"]
    body: |
      ## Finding
      This repository has **{{count}} pull request(s)** that have been open for more than 7 days
      without activity.

      ## Stale PRs
      {{pr_list}}

      ## Impact
      - Stale PRs accumulate merge conflicts and become harder to review over time
      - Maintenance score reduced by {{points_lost}} points

      ## Recommended Action
      For each stale PR, take one of these actions within the next week:
      - **Merge** it if it's ready
      - **Close** it if it's no longer needed
      - **Request changes** to give the author clear next steps
      - **Add a comment** explaining what's blocking it

      ---
      *Generated by [repo-health-checker](https://github.com/launchapp-dev/ao-example-repo-health-checker) on {{scan_date}}*
